<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETAWA SCHOOL - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .month-card { transition: all 0.2s ease-in-out; }
        .month-card:hover { transform: translateY(-4px); }
        .locked-card { opacity: 0.75; filter: grayscale(80%); }
        .locked-card:hover { opacity: 1; filter: grayscale(0%); border-color: #818cf8; }
    </style>
</head>
<body class="bg-slate-50 text-black font-sans min-h-screen flex flex-col">

    <!-- Header Navigation -->
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <!-- Custom SVG Logo: Teacher and Two Students -->
            <svg viewBox="0 0 100 100" class="w-14 h-14 drop-shadow-sm" xmlns="http://www.w3.org/2000/svg">
                <!-- Teacher (Center - Indigo) -->
                <circle cx="50" cy="35" r="14" fill="#4f46e5" />
                <path d="M 30 95 C 30 55, 70 55, 70 95 Z" fill="#4f46e5" />
                <!-- Kid 1 (Left - Emerald) -->
                <circle cx="20" cy="55" r="10" fill="#10b981" />
                <path d="M 5 95 C 5 70, 35 70, 35 95 Z" fill="#10b981" />
                <!-- Kid 2 (Right - Amber) -->
                <circle cx="80" cy="55" r="10" fill="#f59e0b" />
                <path d="M 65 95 C 65 70, 95 70, 95 95 Z" fill="#f59e0b" />
                
                <!-- Faces -->
                <circle cx="45" cy="32" r="1.5" fill="white"/>
                <circle cx="55" cy="32" r="1.5" fill="white"/>
                <path d="M 45 39 Q 50 44 55 39" stroke="white" stroke-width="2" stroke-linecap="round" fill="transparent"/>
                <circle cx="16" cy="53" r="1.2" fill="white"/>
                <circle cx="24" cy="53" r="1.2" fill="white"/>
                <path d="M 16 58 Q 20 62 24 58" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="transparent"/>
                <circle cx="76" cy="53" r="1.2" fill="white"/>
                <circle cx="84" cy="53" r="1.2" fill="white"/>
                <path d="M 76 58 Q 80 62 84 58" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="transparent"/>
            </svg>
            <h1 class="text-3xl font-black tracking-tight text-slate-900 uppercase">Tetawa School</h1>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-8 lg:p-12">
        <div class="mb-10 border-l-4 border-indigo-600 pl-4">
            <h2 class="text-4xl font-bold text-black mb-2">Academic Year Curriculum</h2>
            <p class="text-lg text-slate-600">Select any month to access its curriculum matrix. The active month is tracked automatically.</p>
        </div>

        <!-- 12 Month Grid (Dynamically Populated) -->
        <div id="month-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Cards injected via JavaScript -->
        </div>
    </main>

    <script>
        const grid = document.getElementById('month-grid');
        const months = [
            "January", "February", "March", "April", 
            "May", "June", "July", "August", 
            "September", "October", "November", "December"
        ];
        
        // Fetch current month (0-11) from system clock
        const currentMonthIndex = new Date().getMonth();

        months.forEach((month, index) => {
            const num = (index + 1).toString().padStart(2, '0');
            const file = month.toLowerCase() + '.html';
            const a = document.createElement('a');
            a.href = file;
            
            if (index === currentMonthIndex) {
                // Active Month Styling
                a.className = "bg-white border-2 border-indigo-600 rounded-lg p-8 shadow-md flex flex-col items-center justify-center text-center month-card hover:shadow-lg hover:bg-indigo-50 group";
                a.innerHTML = `
                    <span class="text-indigo-300 font-black text-4xl mb-2 group-hover:text-indigo-400 transition-colors">${num}</span>
                    <h3 class="text-2xl font-black text-indigo-900 uppercase tracking-widest">${month}</h3>
                    <span class="mt-4 text-xs font-bold bg-emerald-100 text-emerald-800 px-4 py-1 rounded-full shadow-sm flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                        ACTIVE CURRICULUM
                    </span>
                `;
            } else {
                // Inactive Month Styling (Past or Future)
                a.className = "bg-white border border-slate-200 rounded-lg p-8 shadow-sm flex flex-col items-center justify-center text-center month-card locked-card hover:shadow-md";
                const statusText = index < currentMonthIndex ? "COMPLETED" : "PENDING";
                a.innerHTML = `
                    <span class="text-slate-400 font-black text-4xl mb-2">${num}</span>
                    <h3 class="text-xl font-bold text-slate-800 uppercase tracking-widest">${month}</h3>
                    <span class="mt-4 text-xs font-bold bg-slate-100 text-slate-500 px-3 py-1 rounded-full border border-slate-200">${statusText}</span>
                `;
            }
            
            grid.appendChild(a);
        });
    </script>
</body>
</html>
